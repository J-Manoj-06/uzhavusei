<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borrow</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f9f4;
      color: #333;
      text-align: center;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      max-width: 400px;
      width: 90%;
    }
    .logo {
      width: 80px;
      height: 80px;
      background-color: #4CAF50;
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #2E7D32;
    }
    p {
      color: #666;
      line-height: 1.5;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      background-color: #4CAF50;
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 30px;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #388E3C;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🌾</div>
    <h1>Borrow</h1>
    <p>Please open this link on a mobile device that has the Borrow app installed to view the details.</p>
    <a href="https://play.google.com/store/apps" class="btn">Download App</a>
  </div>
</body>
</html>
